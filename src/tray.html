<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tray Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #0c0c10;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: "Pixelify Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .tray-menu {
      width: 100%;
      height: 100%;
      background: #0c0c10;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      padding: 6px;
      user-select: none;
    }

    .menu-header {
      padding: 8px 12px 6px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .menu-header img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .menu-header span {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      letter-spacing: 0.3px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
      margin: 4px 6px;
    }

    .menu-item {
      padding: 9px 12px;
      margin: 1px 0;
      border-radius: 8px;
      color: #c4cdd8;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .menu-item:hover {
      background: rgba(217, 70, 239, 0.15);
      color: #d946ef;
    }

    .menu-item.danger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }

    .menu-icon {
      font-size: 13px;
      opacity: 0.75;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="tray-menu">
    <div class="menu-header">
      <img src="../electron/tray_icon.png" alt="Logo">
      <span>Crystalline</span>
    </div>
    <div class="divider"></div>
    <div class="menu-item" id="btn-open">
      <span class="menu-icon">◱</span>
      <span>Open Launcher</span>
    </div>
    <div class="menu-item" id="btn-settings">
      <span class="menu-icon">⚙</span>
      <span>Settings</span>
    </div>
    <div class="menu-item danger" id="btn-quit">
      <span class="menu-icon">✕</span>
      <span>Quit</span>
    </div>
  </div>

  <script>
    document.getElementById('btn-open').addEventListener('click', () => {
      window.electronAPI.showMainWindow();
    });

    document.getElementById('btn-settings').addEventListener('click', () => {
      window.electronAPI.showSettings();
    });

    document.getElementById('btn-quit').addEventListener('click', () => {
      window.electronAPI.quitApp();
    });
  </script>
</body>
</html>
